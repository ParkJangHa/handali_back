spring:
  application:
    name: handali

  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate

  server:
    servlet:
      session:
        timeout: 1h

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true # Flyway 사용 여부
    locations: classpath:db/migration # 마이그레이션 파일 위치
    baseline-on-migrate: true # 초기 마이그레이션이 없을 때 baseline을 자동으로 설정

logging:
  level:
    org.springframework: DEBUG
    com.handalsali.handali: DEBUG

jwt:
  secret: ${JWT_SECRET}
